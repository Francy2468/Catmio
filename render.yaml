services:
  # ── Unified service (Express API + Next.js static frontend) ──────────────
  - type: web
    name: catmio
    runtime: node
    buildCommand: npm install && test -f frontend/out/index.html
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OBFUSCATOR_API_KEY
        sync: false
